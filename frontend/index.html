<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>yAI AI Builder</title>
  </head>
  <body oncontextmenu="return false;">
    <div id="root"></div>
    <script>
      // Anti-Inspect Security Measures
      document.addEventListener('contextmenu', event => event.preventDefault());
      document.onkeydown = function(e) {
        if(e.keyCode == 123) { return false; } // F12
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) { return false; } // Ctrl+Shift+I
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) { return false; } // Ctrl+Shift+C
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) { return false; } // Ctrl+Shift+J
        if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) { return false; } // Ctrl+U
      }
      
      // Console clearing and debugger trap to hinder open devtools
      setInterval(function() {
        const before = new Date().getTime();
        debugger;
        const after = new Date().getTime();
        if (after - before > 100) {
          document.body.innerHTML = "<h1 style='color:red; text-align:center; margin-top:20%;'>Inspect Element is Disabled</h1>";
        }
      }, 2000);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
