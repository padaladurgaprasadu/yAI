version: '3.8'
services:
  neo4j:
    image: neo4j:5.20.0
    container_name: aion_memory
    ports:
      - "7474:7474" # HTTP port for Neo4j Browser (UI)
      - "7687:7687" # Bolt port for Python Driver
    environment:
      - NEO4J_AUTH=neo4j/aion_password123
    volumes:
      - ./neo4j_data:/data

  postgres:
    image: postgres:15
    container_name: aion_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: aion_user
      POSTGRES_PASSWORD: aion_password
      POSTGRES_DB: aion_db
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: aion_redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data
